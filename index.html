<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator — Muhammad Sohaib Imran</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      color: #2A9D8F;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .calculator {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    /* Display */
    .display {
      background: #0f0f0f;
      border-radius: 16px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .expression {
      color: #555;
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result {
      color: #f0f0f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Buttons Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 500;
      height: 64px;
      cursor: pointer;
      transition: all 0.15s ease;
      outline: none;
    }

    button:active { transform: scale(0.94); }

    /* Number buttons */
    .btn-num {
      background: #2a2a2a;
      color: #f0f0f0;
    }
    .btn-num:hover { background: #333; }

    /* Operator buttons */
    .btn-op {
      background: #2A9D8F22;
      color: #2A9D8F;
      border: 1px solid #2A9D8F44;
    }
    .btn-op:hover { background: #2A9D8F44; }

    /* Equals button */
    .btn-eq {
      background: #2A9D8F;
      color: white;
    }
    .btn-eq:hover { background: #238f82; }

    /* Clear button */
    .btn-clear {
      background: #c95a5a22;
      color: #c95a5a;
      border: 1px solid #c95a5a44;
    }
    .btn-clear:hover { background: #c95a5a44; }

    /* Dark button (backspace, +/-) */
    .btn-dark {
      background: #222;
      color: #aaa;
    }
    .btn-dark:hover { background: #2d2d2d; }

    /* Zero spans 2 columns */
    .span2 { grid-column: span 2; }

    footer {
      margin-top: 20px;
      color: #333;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <h1>⬡ Calculator</h1>

  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-dark"  onclick="toggleSign()">+/−</button>
      <button class="btn-dark"  onclick="percentage()">%</button>
      <button class="btn-op"    onclick="setOperator('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op"  onclick="setOperator('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op"  onclick="setOperator('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op"  onclick="setOperator('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span2" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDecimal()">.</button>
      <button class="btn-eq"  onclick="calculate()">=</button>
    </div>
  </div>

  <footer>Muhammad Sohaib Imran &nbsp;|&nbsp; FAST-NUCES Lahore</footer>

  <script>
    let current = '0';
    let previous = '';
    let operator = null;
    let shouldReset = false;

    const resultEl    = document.getElementById('result');
    const expressionEl = document.getElementById('expression');

    function updateDisplay() {
      resultEl.textContent = current;
    }

    function appendNum(num) {
      if (shouldReset) {
        current = num;
        shouldReset = false;
      } else {
        current = current === '0' ? num : current + num;
      }
      if (current.length > 12) current = current.slice(0, 12);
      updateDisplay();
    }

    function appendDecimal() {
      if (shouldReset) { current = '0'; shouldReset = false; }
      if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function setOperator(op) {
      if (operator && !shouldReset) calculate();
      previous = current;
      operator = op;
      shouldReset = true;
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      expressionEl.textContent = `${previous} ${opSymbols[op]}`;
    }

    function calculate() {
      if (!operator || shouldReset) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      let result;

      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b === 0 ? 'Error' : a / b; break;
      }

      expressionEl.textContent = `${previous} ${opSymbols[operator]} ${current} =`;
      current = result === 'Error' ? 'Error' : parseFloat(result.toFixed(10)).toString();
      operator = null;
      shouldReset = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = '';
      operator = null;
      shouldReset = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      current = (parseFloat(current) * -1).toString();
      updateDisplay();
    }

    function percentage() {
      current = (parseFloat(current) / 100).toString();
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNum(e.key);
      else if (e.key === '.') appendDecimal();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        current = current.length > 1 ? current.slice(0, -1) : '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
